jurisdiction:
  code: IN
  name: 'India'
  region: SOUTH_ASIA
  launchDate: '2026-02-15'
  timeZone: 'Asia/Kolkata'
  currencyCode: 'INR'
  currencySymbol: '₹'

regulatoryFramework:
  primaryRegulator: 'SEBI'
  secondaryRegulator: 'RBI'
  applicableLaws:
    - SEBI_ACT_1992
    - SECURITIES_CONTRACTS_REGULATION_ACT_1956
    - PREVENTION_OF_MONEY_LAUNDERING_ACT_2002
    - DIGITAL_PERSONAL_DATA_PROTECTION_ACT_2023
    - FOREIGN_EXCHANGE_MANAGEMENT_ACT_1999

regulatoryBodies:
  - id: SEBI
    name: 'Securities and Exchange Board of India'
    jurisdiction: NATIONAL
    website: 'https://www.sebi.gov.in'
    reportingEmail: 'aml@sebi.gov.in'
    contactPhone: '+91-22-2631-8000'
    reportingFormats: [ONLINE_PORTAL, EMAIL, PHYSICAL_SUBMISSION]
    reportingLanguages: [EN, HI]

  - id: RBI
    name: 'Reserve Bank of India'
    jurisdiction: NATIONAL
    website: 'https://www.rbi.org.in'
    reportingEmail: 'aml.rbi@rbi.org.in'
    reportingFormats: [ONLINE_PORTAL, EMAIL]

  - id: FIU_IND
    name: 'Financial Intelligence Unit - India'
    jurisdiction: NATIONAL
    website: 'https://www.fiu.gov.in'
    reportingEmail: 'aml@fiu.gov.in'
    reportingDeadline: 7 # Days from detection

  - id: DPB
    name: 'Data Protection Board of India (DPDP)'
    jurisdiction: NATIONAL
    website: 'https://www.meity.gov.in'
    reportingEmail: 'dpdp@meity.gov.in'
    dataBreachReportingDeadline: 72 # Hours

fundStructure:
  requiredLegalEntity: 'SEBI_REGISTERED_MUTUAL_FUND_OR_AIF'
  minFundSize: 500000000 # INR (~6 million USD)
  maxInvestors: UNLIMITED
  minInvestors: 2
  allowedFundTypes:
    - CATEGORY_I_AIF
    - CATEGORY_II_AIF
    - CATEGORY_III_AIF
    - MUTUAL_FUND

  lpEligibility:
    - QUALIFIED_INSTITUTIONAL_BUYER
    - HIGH_NET_WORTH_INDIVIDUAL_MIN_INR_2CR
    - CORPORATE_INVESTOR
    - NRI_OVERSEAS_CITIZEN_OF_INDIA
    - FPI_FOREIGN_PORTFOLIO_INVESTOR

  minInvestmentAmount: 10000000 # INR (1 crore) for institutions

kyc:
  providerIntegration: 'ballerine'
  livenessCheck: true
  faceMatch: true
  docLanguages: [EN, HI, LOCAL]

  docRequirements:
    individual:
      - PAN_CARD_MANDATORY
      - AADHAAR_OR_GOVERNMENT_ID
      - PASSPORT_OR_DRIVING_LICENSE
      - ADDRESS_PROOF_RECENT
      - BANK_STATEMENT_OR_UTILITY_BILL
      - DPDP_CONSENT_FORM

    corporate:
      - CERTIFICATE_OF_INCORPORATION
      - PAN_OF_COMPANY
      - MOA_AND_AOA
      - BOARD_RESOLUTION
      - AUDITED_BALANCE_SHEET
      - GST_REGISTRATION_CERTIFICATE
      - DPDP_CONSENT_FORM

    nri_or_fpi:
      - PASSPORT
      - PAN_OR_APPLICATION_FOR_PAN
      - OECD_CRS_FORM
      - SELF_DECLARATION
      - BENEFICIAL_OWNERSHIP_FORM

  sanctionsList:
    - OFAC_SDN_LIST
    - UN_SECURITY_COUNCIL_LIST
    - EU_CONSOLIDATED_LIST
    - RBI_BANNED_ENTITIES
    - SEBI_BANNED_PERSONS
    - INTERPOL_RED_NOTICES
    - NIA_WANTED_PERSONS

  pepDefinition: 'Public servants holding any position in central or state government, judiciary, or public sector undertakings'
  pepCheck: true
  pepRelativeCheck: true
  pepRelativeLevels: 1

  adverseMediaScreening: true
  aml_flagged_check: true

  kycRefreshInterval: 365 # Annual
  kycExpiryNotification: 60 # Days before expiry

  enhancedDueDigence:
    high_risk_countries: [PAKISTAN, BANGLADESH, NEPAL_PARTIALLY, AFGHANISTAN]
    transaction_threshold_for_edd: 2500000 # INR (~30000 USD)
    structuring_detection: MANDATORY
    source_of_funds_clarity_required: true

aml:
  reportingThreshold: 2500000 # INR (Suspicious transaction report to FIU)
  reportingDeadline: 7 # Days
  ctr_threshold: 1000000 # Currency transaction report (cash)
  ctr_reporting_deadline: 30 # Days

  suspiciousActivityIndicators:
    - STRUCTURING_BELOW_THRESHOLD
    - CASH_DEPOSITS_WITHOUT_SOURCE
    - RAPID_REMITTANCES_ABROAD
    - ROUND_AMOUNT_TRANSACTIONS
    - MISMATCHED_CUSTOMER_PROFILE
    - CIRCULAR_TRADING_PATTERNS
    - SHELL_COMPANY_INDICATORS
    - SHAM_INVOICE_TRADING

  velocityLimits:
    individual_daily_volume: 5000000 # INR per person per day
    individual_monthly_volume: 25000000 # INR per person per month
    corporate_daily_volume: 50000000
    corporate_monthly_volume: 250000000
    nri_daily_limit: 2500000 # Stricter for NRI

  riskScoring:
    high_risk_threshold: 70
    medium_risk_threshold: 40
    sanctions_match_score: 100 # Automatic blocking
    pep_match_score: 75
    adverse_media_score: 60
    structuring_score: 80
    high_risk_jurisdiction_score: 85

governance:
  majorChangesRequireVote: true
  gpVotingThreshold: 50
  lpVotingThreshold: 50
  distributionsAllowed: true
  earlyWithdrawal: true

  majorChangeDefinitions:
    - CHANGE_IN_FUND_STRATEGY
    - CHANGE_OF_FUND_MANAGER
    - SIGNIFICANT_FEE_INCREASE
    - CHANGE_OF_CUSTODIAN
    - FUND_CLOSURE_OR_MERGER

reporting:
  annualReportRequired: true
  sebiFilingDeadline: 120 # Days after fiscal year end (March 31)
  quarterlyReportFrequency: REQUIRED
  kycCheckFrequency: BIENNIAL # Every 2 years under SEBI AIF rules
  complianceAuditFrequency: ANNUAL

dataResidency:
  allowedCountries: [IN]
  customerDataMustStayInIndia: true
  encryptionRequired: true
  dpdpCompliance: MANDATORY

dpdp:
  consentRequired: true
  purposeOfProcessingClear: true
  dataminimization: true
  storageLocationIndia: true
  rightToAccessRequired: true
  dataDeletionAfterTermination: true
  dataRetentionPeriod: 6 # Years for financial records
  dataBreachNotificationRequired: true
  dataBreachNotificationDeadline: 72 # Hours to register with DPB

femalpa:
  foreignExchangeCompliance: true
  remittanceStackRules: true
  liberalized_remittance_scheme: true
  fpi_registration_required: true
  fdi_route_compliance: true

tax_compliance:
  tds_deduction_required: true
  tds_rate: 0.10 # 10% on payment/credit
  gst_registration_required: true
  gst_rate: 0.18 # Standard rate, may vary
  income_tax_filings: true
  quarterly_filing: true

expansion:
  multiStateAllowed: true
  internationalFundingAllowed: RESTRICTED # Requires FEMA approval
  redomestication: ALLOWED_WITH_SEBI_APPROVAL
  offshore_fund_structure: ALLOWED_UNDER_CATEGORIES

advancedFeatures:
  secondaryMarketAllowed: true
  leverageAllowed: RESTRICTED # Categories I & III
  cryptocurrencyAllowed: false # Still evolving regulatory position
  derivativesAllowed: true
  shortSellingAllowed: true

restrictedEntities:
  banned_entities: ['Specific entities banned by SEBI/RBI/GOI']
  shell_companies: PROHIBITED
  politically_connected_entities: ENHANCED_DUE_DILIGENCE

errorCodeMapping:
  IN001: 'Sanctions match detected - transaction blocked'
  IN002: 'PEP detected - enhanced screening required'
  IN003: 'Suspicious activity reported to FIU-IND'
  IN004: 'DPDP violation detected - data handling non-compliant'
  IN005: 'High-risk country transaction detected'
  IN006: 'Structuring/layering pattern detected'
  IN007: 'Adverse media match - manual review required'
  IN008: 'PAN verification failed - KYC incomplete'
  IN009: 'Aadhaar verification failed'
  IN010: 'Source of funds unclear - EDD required'
  IN011: 'Fund remittance restrictions apply'
  IN012: 'NRI transaction limits exceeded'

sebiAifCompliance:
  categoryI: 'Venture funds, infrastructure funds, SME funds'
  categoryII: 'Mid-market/buyout funds, debt funds'
  categoryIII: 'RE, RE-AIF, hedge funds'
  regulatoryCapital: 'Minimum investment by sponsor/manager'
  lockInPeriod: 'Min 4 years for Category I & III'

moneyTransferRegulations:
  applicableLaws:
    - PAYMENT_AND_SETTLEMENT_SYSTEMS_ACT_2007      # PSS Act — RBI oversight of payment systems
    - RBI_PAYMENT_AGGREGATOR_GATEWAY_GUIDELINES_2020 # PA/PG framework for online payments
    - FEMA_1999_CROSS_BORDER_TRANSFERS             # Foreign Exchange Management Act
    - FOREIGN_CONTRIBUTION_REGULATION_ACT_2010     # FCRA for foreign inflows to NGOs/certain entities
    - PMLA_2002_WIRE_TRANSFER_RULES                # Anti-money laundering for payment service providers
    - RBI_KYC_MASTER_DIRECTION_2016                # Unified KYC norms for regulated entities
    - RBI_PREPAID_PAYMENT_INSTRUMENT_GUIDELINES    # PPIs (wallets, gift cards, prepaid cards)
    - RBI_CROSS_BORDER_PAYMENT_GUIDELINES_2022     # Updated framework for inward/outward remittances
    - FATF_RECOMMENDATION_16_TRAVEL_RULE           # Adopted through PMLA amendments

  pssActRequirements:
    description: >
      The Payment and Settlement Systems Act 2007 (PSS Act) governs all payment systems
      in India. Only entities authorised by the Reserve Bank of India (RBI) may operate
      a payment system. Includes RTGS, NEFT, IMPS, UPI, and cross-border gateways.
    rbiAuthorizationMandatory: true
    authorizationCategories:
      - PAYMENT_SYSTEM_OPERATOR_LICENSE
      - PAYMENT_AGGREGATOR_LICENSE
      - CROSS_BORDER_PAYMENT_AGGREGATOR_LICENSE   # Mandatory for PA-CB from April 2024
    netWorthRequirementINR: 150000000              # ₹15 crore min net worth (PA guidelines)
    escrowMandatory: true                          # Settlement funds must be in escrow
    auditRequirement: ANNUAL_SYSTEM_AUDIT
    grievanceRedressal: MANDATORY_30_DAY_RESOLUTION

  moneyTransferServiceScheme:
    description: >
      MTSS (Money Transfer Service Scheme) governs inward personal remittances into India.
      Foreign entities partner with Indian agents (banks/NBFCs) under RBI-approved MTSS.
      ONLY inward remittances; no outward transfers under MTSS.
    direction: INWARD_ONLY
    maxSingleTransactionINR: 50000                 # INR per transaction cap
    maxTransactionsPerYearPerSender: 30
    requiresRBIAuthorization: true
    agentsRequireBankPartner: true
    purposeCodesRequired: true                     # RBI-mandated remittance purpose codes

  liberalizedRemittanceScheme:
    description: >
      RBI's LRS allows resident individuals to remit up to $250,000 per financial year
      for permissible capital and current account transactions.
    maxPerYearUSD: 250000
    applicableTo: RESIDENT_INDIVIDUALS_ONLY
    notAllowedFor:
      - PURCHASE_OF_LOTTERY_TICKETS
      - MARGIN_TRADING_FOREX
      - REMITTANCE_TO_FATF_BLACKLIST_COUNTRIES
    purposeCodesRequired: true
    formA2Required: true                           # AD-bank form mandatory
    panMandatory: true
    taxCollectedAtSource:
      enabled: true
      rate: 0.20                                   # 20% TCS on LRS above INR 700,000/year (Finance Act 2023)
      thresholdINR: 700000

  feamaCrossBorderRules:
    description: >
      FEMA 1999 and RBI circulars govern all cross-border capital and current account
      transfers. AD Category-I banks are primary intermediaries.
    inwardRemittances:
      purposeCodesRequired: true
      maximumWithoutDocumentationUSD: 25000
      firaRequired: true                           # Foreign Inward Remittance Advice
    outwardRemittances:
      adBankApprovalRequired: CASE_BY_CASE
      capitalAccountRestrictionsApply: true
      form15CaRequired: true                       # For outward taxable payments
      form15CbRequired: true                       # CA certificate for large remittances

  travelRule:
    description: >
      India has incorporated FATF Recommendation 16 through amendments to PMLA (2023).
      Payment Service Providers must transmit originator and beneficiary information
      with cross-border wire transfers.
    thresholdINR: 50000                            # ~$600 USD equivalent
    requiredOriginatorInfo:
      - FULL_LEGAL_NAME
      - ACCOUNT_NUMBER
      - PHYSICAL_ADDRESS_OR_PAN
    requiredBeneficiaryInfo:
      - FULL_LEGAL_NAME
      - ACCOUNT_NUMBER
    intermediaryRetentionRequired: true

  domesticPaymentLimits:
    rtgs:
      minTransactionINR: 200000                    # RTGS minimum ₹2 lakh
      maxTransactionINR: UNLIMITED
      availabilityHours: '24x7'
    neft:
      minTransactionINR: 1
      maxTransactionINR: UNLIMITED
      availabilityHours: '24x7'
    imps:
      maxTransactionINR: 500000                    # ₹5 lakh per transaction
      availabilityHours: '24x7'
    upi:
      maxTransactionINR: 100000                    # ₹1 lakh per transaction (₹2L for specific categories)
      maxPerDayINR: 100000
    ppi_wallets:
      maxBalanceINR: 200000                        # Full KYC PPI wallet max balance

  velocityLimitsINR:
    individual_single_transfer_max: 500000
    individual_daily_max: 1000000
    individual_monthly_max: 5000000
    corporate_single_transfer_max: UNLIMITED       # Subject to AD bank approval

  highRiskDestinations:
    hardBlock: [IR, KP, SY, CU]                   # FATF blacklist
    enhancedDueDiligence: [PK, AF, BD_PARTIALLY]

  errorCodeMapping:
    MT_IN001: 'RBI PSS Act authorization missing — payment system operation not permitted'
    MT_IN002: 'MTSS single-transaction limit exceeded (INR 50,000)'
    MT_IN003: 'LRS annual limit of USD 250,000 exceeded'
    MT_IN004: 'TCS on LRS not collected — Finance Act 2023 requirement'
    MT_IN005: 'Form A2 missing for outward LRS remittance'
    MT_IN006: 'Travel Rule: originator/beneficiary information incomplete'
    MT_IN007: 'PAN not linked — remittance above threshold blocked'
    MT_IN008: 'FIRA (Foreign Inward Remittance Advice) not generated'
    MT_IN009: 'Purpose code missing for cross-border transfer'
    MT_IN010: 'FATF blacklist country — transfer blocked'
    MT_IN011: 'UPI daily limit exceeded'
    MT_IN012: 'PMLA suspicious transaction reporting required'

notes:
  - 'SEBI AIF rules supersede general FEMA rules for registered AIFs'
  - 'NRI and FPI regulations evolve frequently - check SEBI website'
  - 'DPDP Act compliance mandatory from Nov 2024 onwards'
  - 'Crypto regulations still evolving - check latest RBI circulars'
  - 'Common Man s Taxation is PAN-based for individuals'

